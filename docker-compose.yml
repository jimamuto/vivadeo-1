services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sentrysearch
      POSTGRES_USER: sentrysearch
      POSTGRES_PASSWORD: sentrysearch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentrysearch -d sentrysearch"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: sh -c "alembic upgrade head && uvicorn sentrysearch.api:app --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://sentrysearch:sentrysearch@postgres:5432/sentrysearch
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_BUCKET: sentrysearch
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "8010:8000"
    volumes:
      - ./media:/media:ro
      - ${HOME}/.modal.toml:/root/.modal.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build: .
    command: sh -c "alembic upgrade head && celery -A sentrysearch.worker.celery_app worker --loglevel=INFO"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://sentrysearch:sentrysearch@postgres:5432/sentrysearch
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_BUCKET: sentrysearch
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./media:/media:ro
      - ${HOME}/.modal.toml:/root/.modal.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
